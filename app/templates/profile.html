{% extends "base.html" %}

{% block content %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <div class="navbar-nav">
                <a class="nav-link" href="/mainpage">Главная</a>
                <a class="nav-link" href="/sport">Спорт</a>
                <a class="nav-link" href="/food">Питание</a>
                <a class="nav-link" href="/profile">Профиль</a>
            </div>
        </div>
    </nav>
    <h1 style="text-align: center;">Профиль</h1>
    <div id="profile"></div>
    <script>
        document.addEventListener('DOMContentLoaded', async function getData() {
            let user = localStorage.getItem('user');
            let token = localStorage.getItem('access_token');

            if (!token) {
                document.getElementById('profile').innerText = `Вы не найдены в системе, войдите или зарегистрируйтесь`;
                return;
            }
            else {
                const userData = JSON.parse(user)
                document.getElementById('profile').innerText = `${userData.name}`;
            }
        })
    </script>
{% endblock %}
